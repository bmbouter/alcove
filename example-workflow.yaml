# Example workflow definition demonstrating the YAML schema
# This file showcases all supported workflow features including:
# - Multi-step dependencies with DAG structure
# - Cross-repository agent dispatch
# - Enhanced conditional execution with boolean operators and numeric comparisons
# - Field-based routing for simple output-driven decisions
# - Input/output templating
# - Approval gates
# - GitHub event triggers

name: Feature Delivery Pipeline

workflow:
  # Root step: triggered by GitHub issues with ready-for-dev label
  # Cross-repo dispatch: agent works on pulp_python repo
  - id: implement
    agent: autonomous-developer
    repo: pulp/pulp_python  # Agent will work on this repo instead of the workflow's repo
    trigger:
      github:
        events: [issues]
        labels: [ready-for-dev]
    outputs: [pr_url, summary, branch_name]

  # Triage step: demonstrates field-based routing
  - id: triage
    agent: triage-agent
    needs: [implement]
    route_field: complexity
    route_map:
      simple: quick-review
      complex: thorough-review
    outputs: [complexity, risk_assessment]

  # Quick review path for simple changes
  - id: quick-review
    agent: quick-reviewer
    needs: [triage]
    outputs: [review_status, issues_found]

  # Thorough review path for complex changes
  - id: thorough-review
    agent: thorough-reviewer
    needs: [triage]
    outputs: [review_status, security_check, performance_check]

  # Cross-repo step: update core library based on plugin implementation
  # Demonstrates enhanced condition evaluation with boolean operators
  - id: update-core
    agent: autonomous-developer
    repo: pulp/pulpcore  # Different repository from the first step
    needs: [quick-review, thorough-review]
    condition: "(steps.quick-review.outputs.review_status == 'approved' || steps.thorough-review.outputs.review_status == 'approved') && steps.implement.outcome == 'completed'"
    inputs:
      context: "Update core to support changes in {{steps.implement.outputs.pr_url}}"
      plugin_summary: "{{steps.implement.outputs.summary}}"
    outputs: [core_pr_url, core_changes]

  # Deploy to staging: runs after core update completes successfully
  - id: deploy-staging
    agent: deploy-agent
    needs: [update-core]
    condition: "steps.update-core.outcome == 'completed'"
    inputs:
      pr_url: "{{steps.implement.outputs.pr_url}}"
      core_pr_url: "{{steps.update-core.outputs.core_pr_url}}"
      context: "{{steps.implement.outputs.summary}}"
      environment: "staging"
    outputs: [deployment_url, version]

  # Smoke tests: runs after staging deployment with numeric comparison
  - id: verify-staging
    agent: smoke-test
    needs: [deploy-staging]
    inputs:
      target_url: "{{steps.deploy-staging.outputs.deployment_url}}"
      version: "{{steps.deploy-staging.outputs.version}}"
    outputs: [test_results, status, coverage_percent]

  # Production deployment: requires manual approval and enhanced conditions
  - id: deploy-production
    agent: deploy-agent
    needs: [verify-staging]
    approval: required
    condition: "steps.verify-staging.outputs.status == 'passed' && steps.verify-staging.outputs.coverage_percent >= 85"
    inputs:
      pr_url: "{{steps.implement.outputs.pr_url}}"
      context: "Deploying verified version {{steps.deploy-staging.outputs.version}}"
      environment: "production"
    outputs: [production_url, deployment_id]

  # Post-deployment verification
  - id: verify-production
    agent: smoke-test
    needs: [deploy-production]
    inputs:
      target_url: "{{steps.deploy-production.outputs.production_url}}"
      deployment_id: "{{steps.deploy-production.outputs.deployment_id}}"
    outputs: [final_status]

  # Cleanup: runs regardless of success/failure of verification
  - id: cleanup
    agent: cleanup-agent
    needs: [verify-production]
    inputs:
      branch_name: "{{steps.implement.outputs.branch_name}}"
      staging_url: "{{steps.deploy-staging.outputs.deployment_url}}"