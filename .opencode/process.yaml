version: 1

phases:
  - id: problem
    name: Problem Definition
    description: >
      Describe the problem or need clearly. What is broken, missing,
      or suboptimal? Don't prescribe solutions yet.
    content:
      location: description
      header: "## Problem"
      min_words: 15
      alternate_patterns:
        - regex: "## Why"
        - regex: "## Motivation"

  - id: spec
    name: Specification
    description: >
      Define scope, boundaries, and acceptance criteria.
      What does "done" look like?
    content:
      location: description
      header: "## Spec"
      min_words: 20
      alternate_patterns:
        - regex: "## Design"
        - regex: "## Approach"

  - id: plan
    name: Implementation Plan
    description: >
      Break the work into independently implementable steps.
      Each step should be a PR-sized unit.
    content:
      location: description
      header: "## Plan"
      min_words: 15
      alternate_patterns:
        - regex: "## Implementation"
        - regex: "## Steps"

issue_types:
  Epic:
    phases: [problem, spec, plan]
  Feature:
    phases: [problem, spec]
  Bug:
    phases: [problem]
  Task:
    phases: [problem]

default_phases: [problem]

exemptions:
  summary_patterns:
    - "^Release v"
    - "\\bbump\\b"
    - "\\btypo\\b"
    - "\\bCI:"
  labels:
    - immediate-release
    - possible-duplicate
