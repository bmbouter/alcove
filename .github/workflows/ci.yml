name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - run: go test ./...
        env:
          GOPROXY: direct

      - run: go vet ./...
        env:
          GOPROXY: direct

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - run: make build
        env:
          GOPROXY: direct

  cross-platform-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Build CLI for ${{ matrix.os }}/${{ matrix.arch }}
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOPROXY: direct
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            ext=".exe"
          fi

          echo "Cross-compiling alcove CLI for ${{ matrix.os }}/${{ matrix.arch }}..."
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=test" \
            -o "alcove-${{ matrix.os }}-${{ matrix.arch }}$ext" ./cmd/alcove

          # Basic validation (check if binary was created)
          ls -la "alcove-${{ matrix.os }}-${{ matrix.arch }}$ext"

  functional-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Detect version
        id: version
        run: echo "tag=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: make build
        env:
          VERSION: ${{ steps.version.outputs.tag }}

      - name: Create networks
        run: |
          podman network create --internal alcove-internal
          podman network create alcove-external

      - name: Start PostgreSQL
        run: |
          podman run -d --rm \
            --name alcove-ledger \
            -e POSTGRES_USER=alcove \
            -e POSTGRES_PASSWORD=alcove \
            -e POSTGRES_DB=alcove \
            -p 5432:5432 \
            docker.io/library/postgres:16

      - name: Start NATS
        run: |
          podman run -d --rm \
            --name alcove-hail \
            -p 4222:4222 \
            -p 8222:8222 \
            docker.io/library/nats:latest

      - name: Generate alcove.yaml
        run: sed "s/change-me-to-a-strong-secret/$(openssl rand -hex 32)/" alcove.yaml.example > alcove.yaml

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U alcove; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Start Bridge locally
        run: |
          LEDGER_DATABASE_URL="postgres://alcove:alcove@localhost:5432/alcove?sslmode=disable" \
          HAIL_URL="nats://localhost:4222" \
          RUNTIME=podman \
          ALCOVE_NETWORK=alcove-internal \
          ALCOVE_EXTERNAL_NETWORK=alcove-external \
          VERSION=${{ steps.version.outputs.tag }} \
          nohup ./bin/bridge > /tmp/alcove-bridge.log 2>&1 &

      - name: Wait for Bridge health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/v1/health; then
              echo ""
              echo "Bridge is healthy"
              exit 0
            fi
            echo "Waiting for Bridge... ($i/30)"
            sleep 2
          done
          echo "Bridge did not become healthy in time"
          cat /tmp/alcove-bridge.log || true
          exit 1

      - name: Run functional tests (parallel)
        run: |
          pids=()
          ADMIN_PASSWORD=admin ./scripts/test-credentials.sh & pids+=($!)
          ADMIN_PASSWORD=admin ./scripts/test-schedules.sh & pids+=($!)
          ADMIN_PASSWORD=admin ./scripts/test-user-isolation.sh & pids+=($!)
          ADMIN_PASSWORD=admin ./scripts/test-ledger-access.sh & pids+=($!)
          ADMIN_PASSWORD=admin ./scripts/test-yaml-only.sh & pids+=($!)

          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done

          if [ "$failed" -eq 1 ]; then
            echo "One or more test scripts failed"
            exit 1
          fi

      - name: Run agent repo tests
        run: ADMIN_PASSWORD=admin ./scripts/test-agent-repos.sh

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Bridge logs ==="
          cat /tmp/alcove-bridge.log || true
          echo "=== Ledger ==="
          podman logs alcove-ledger 2>&1 || true
          echo "=== Hail ==="
          podman logs alcove-hail 2>&1 || true

      - name: Teardown
        if: always()
        run: |
          kill $(cat /tmp/alcove-bridge.pid 2>/dev/null) 2>/dev/null || pkill -f './bin/bridge' || true
          podman stop alcove-hail 2>/dev/null || true
          podman stop alcove-ledger 2>/dev/null || true
          podman network rm alcove-internal 2>/dev/null || true
          podman network rm alcove-external 2>/dev/null || true
