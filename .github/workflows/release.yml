name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/bmbouter

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Go binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          # Build server components (Linux only)
          for cmd in bridge gate skiff-init; do
            echo "Building ${cmd} for Linux..."
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
              go build -ldflags="-s -w -X main.Version=${VERSION}" \
              -o "dist/alcove-${cmd}-linux-amd64" "./cmd/${cmd}"
          done

          # Build CLI for multiple platforms
          echo "Building alcove CLI for all platforms..."
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            export GOOS=${platform%/*} GOARCH=${platform#*/}
            ext=""
            if [ "$GOOS" = "windows" ]; then
              ext=".exe"
            fi
            echo "  Building alcove for $GOOS/$GOARCH..."
            CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${VERSION}" \
              -o "dist/alcove-$GOOS-$GOARCH$ext" "./cmd/alcove"
          done

          # Maintain backward compatibility with existing naming
          cp "dist/alcove-linux-amd64" "dist/alcove-alcove-linux-amd64"

          cd dist && sha256sum * > checksums-sha256.txt

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push bridge image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Containerfile.bridge
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/alcove-bridge:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/alcove-bridge:latest
            ${{ env.REGISTRY }}/alcove-bridge:sha-${{ steps.version.outputs.sha_short }}

      - name: Build and push gate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Containerfile.gate
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/alcove-gate:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/alcove-gate:latest
            ${{ env.REGISTRY }}/alcove-gate:sha-${{ steps.version.outputs.sha_short }}

      - name: Build and push skiff-base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Containerfile.skiff-base
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/alcove-skiff-base:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/alcove-skiff-base:latest
            ${{ env.REGISTRY }}/alcove-skiff-base:sha-${{ steps.version.outputs.sha_short }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Alcove ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/alcove-bridge-linux-amd64
            dist/alcove-gate-linux-amd64
            dist/alcove-skiff-init-linux-amd64
            dist/alcove-alcove-linux-amd64
            dist/alcove-linux-amd64
            dist/alcove-linux-arm64
            dist/alcove-darwin-amd64
            dist/alcove-darwin-arm64
            dist/alcove-windows-amd64.exe
            dist/checksums-sha256.txt
            scripts/install.sh
            scripts/install.ps1
