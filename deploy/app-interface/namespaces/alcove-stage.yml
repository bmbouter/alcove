---
$schema: /openshift/namespace-1.yml

labels:
  argocd.argoproj.io/managed-by: openshift-gitops

name: alcove-stage

description: Alcove staging namespace

# TODO: Replace with actual cluster $ref for your target cluster
cluster:
  $ref: /openshift/CLUSTER_NAME/cluster.yml

app:
  $ref: /services/alcove/app.yml

# TODO: Replace with actual environment $ref
environment:
  $ref: /products/app-sre/environments/stage.yml

managedRoles: true

managedResourceTypes: []

externalResources:
- provider: rds
  identifier: alcove-db
  output_resource_name: alcove-db
  defaults: /services/alcove/rds-defaults.yml
  resources:
  - provider: rds
    identifier: alcove-db
    output_resource_name: alcove-db
    annotations:
      qontract.recycle_pods: "true"
    overrides:
      engine: postgres
      engine_version: "16"
      instance_class: db.t3.medium
      allocated_storage: 20
      storage_encrypted: true
      multi_az: false

openshiftResources:
- provider: vault-secret
  path: app-sre/alcove/stage/config
  version: 2
  name: alcove-config
  annotations:
    qontract.recycle_pods: "true"
