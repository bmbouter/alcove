# NetworkPolicies for Alcove pods.
#
# All policies are scoped to Alcove pods only (app.kubernetes.io/part-of: alcove)
# to avoid affecting other applications in a shared namespace.
#
# Per-Skiff NetworkPolicies are created dynamically by Bridge at task time
# to isolate Skiff pods (only Gate sidecar gets external egress).
---
# Deny all traffic for Alcove pods by default.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alcove-default-deny
  namespace: alcove
  labels:
    app.kubernetes.io/part-of: alcove
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: alcove
  policyTypes:
    - Ingress
    - Egress
---
# Allow Alcove pods to communicate with each other and resolve DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alcove-allow-internal
  namespace: alcove
  labels:
    app.kubernetes.io/part-of: alcove
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: alcove
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: alcove
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: alcove
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow Bridge egress to external networks for OAuth2 token exchange
# and Kubernetes API access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alcove-bridge-egress
  namespace: alcove
  labels:
    app.kubernetes.io/part-of: alcove
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bridge
  policyTypes:
    - Egress
  egress:
    - {}
---
# Allow direct-outbound pods unrestricted egress. These pods have the
# alcove.dev/direct-outbound label set by Bridge when DirectOutbound is true,
# bypassing the Gate proxy for outbound traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alcove-allow-direct-outbound
  namespace: alcove
  labels:
    app.kubernetes.io/part-of: alcove
spec:
  podSelector:
    matchLabels:
      alcove.dev/direct-outbound: "true"
  policyTypes:
    - Egress
  egress:
    - {}
