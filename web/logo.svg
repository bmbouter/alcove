  <!-- Third wave layer -->
  <path d="M 100 48
           Q 130 45 145 62 Q 160 80 158 100
           Q 156 120 142 138 Q 125 155 100 155
           Q 75 155 58 138 Q 44 120 42 100
           Q 40 80 55 62 Q 70 45 100 48 Z"
