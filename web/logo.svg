  <!-- Inner glow -->
  <circle cx="100" cy="100" r="8" fill="#e0f2fe" opacity="0.6"/>

  <!-- Small radiating dots -->
  <circle cx="100" cy="75" r="2.5" fill="#7dd3fc" opacity="0.8"/>
  <circle cx="125" cy="100" r="2.5" fill="#7dd3fc" opacity="0.8"/>
  <circle cx="100" cy="125" r="2.5" fill="#7dd3fc" opacity="0.8"/>
  <circle cx="75" cy="100" r="2.5" fill="#7dd3fc" opacity="0.8"/>
