<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="outer-wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="inner-wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Outer wave layer - simplified -->
  <path d="M 16 3
           Q 25 3 28 8 Q 31 13 30 16
           Q 29 19 26 24 Q 21 29 16 29
           Q 11 29 6 24 Q 3 19 2 16
           Q 1 13 4 8 Q 7 3 16 3 Z"
        fill="none" stroke="url(#outer-wave)" stroke-width="2" opacity="0.8"/>

  <!-- Inner wave layer -->
  <path d="M 16 8
           Q 21 8 23 11 Q 25 14 24 16
           Q 23 18 21 21 Q 18 24 16 24
           Q 14 24 11 21 Q 9 18 8 16
           Q 7 14 9 11 Q 11 8 16 8 Z"
        fill="none" stroke="url(#inner-wave)" stroke-width="2"/>

  <!-- Central agent diamond -->
  <path d="M 16 12 L 19 15 L 16 20 L 13 15 Z" fill="url(#core)"/>

  <!-- Central glow point -->
  <circle cx="16" cy="16" r="1.5" fill="#e0f2fe" opacity="0.8"/>
</svg>
