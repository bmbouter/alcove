name: alcove-developer
display_name: Alcove Developer
description: Full development lifecycle access to bmbouter/alcove — read, write, PR, merge, and release
tools:
  github:
    rules:
      - repos: ["bmbouter/alcove"]
        operations:
          - clone
          - read_prs
          - read_issues
          - read_contents
          - read_actions
          - read_releases
          - read_commits
          - read_branches
          - read_git
          - push_branch
          - create_pr_draft
          - create_comment
          - update_issue
          - update_pr
          - merge_pr
          - delete_branch
          - write_contents
          - write_releases
          - write_git
