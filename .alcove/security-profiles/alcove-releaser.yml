name: alcove-releaser
display_name: Alcove Releaser
description: Create releases, push git tags, monitor CI, and deploy to staging via app-interface
tools:
  github:
    rules:
      - repos: ["bmbouter/alcove"]
        operations:
          - clone
          - read_contents
          - read_commits
          - read_branches
          - read_git
          - read_releases
          - read_actions
          - push_branch
          - write_releases
          - write_git
  gitlab:
    rules:
      - repos: ["*"]
        operations:
          - read_contents
          - read_merge_requests
          - create_branch
          - push_branch
          - create_merge_request
          - create_comment
          - write_contents
