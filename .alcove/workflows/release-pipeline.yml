name: Release Pipeline
workflow:
  - id: check-and-release
    agent: Automated Release Agent
    trigger:
      schedule:
        cron: "0 6 * * *"
        enabled: true
      github:
        events: [issues]
        labels: [immediate-release]
        repos: [bmbouter/alcove]
        delivery_mode: polling
    outputs: [version, release_url, has_commits]
