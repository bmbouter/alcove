name: Release Pipeline
trigger:
  schedule:
    cron: "0 6 * * *"
    enabled: true
  github:
    events: [issues]
    actions: [labeled]
    labels: [immediate-release]
    repos: [bmbouter/alcove]
    delivery_mode: polling

workflow:
  - id: release
    type: agent
    agent: Automated Release Agent
    outputs: [version, has_commits]
