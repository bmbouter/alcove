# Example workflow definition demonstrating the YAML schema
# This file showcases all supported workflow features including:
# - Bridge actions (create-pr, await-ci, merge-pr) for deterministic operations
# - Depends expressions with && and || operators
# - Cross-repository agent dispatch
# - Input/output templating
# - Approval gates

name: Feature Delivery Pipeline

workflow:
  # Root step: triggered by GitHub issues with ready-for-dev label
  # Cross-repo dispatch: agent works on pulp_python repo
  - id: implement
    type: agent
    agent: autonomous-developer
    repo: pulp/pulp_python
    trigger:
      github:
        events: [issues]
        labels: [ready-for-dev]
    outputs: [summary, branch_name]

  # Create a PR from the implementation branch
  - id: create-pr
    type: bridge
    action: create-pr
    depends: "implement.Succeeded"
    inputs:
      repo: pulp/pulp_python
      branch: "{{steps.implement.outputs.branch_name}}"
      title: "Implement feature from issue"
      base: main

  # Wait for CI to pass on the PR
  - id: await-ci
    type: bridge
    action: await-ci
    depends: "create-pr.Succeeded"
    max_iterations: 4
    inputs:
      repo: pulp/pulp_python
      pr: "{{steps.create-pr.outputs.pr_number}}"

  # Review the PR after CI passes
  - id: review
    type: agent
    agent: thorough-reviewer
    depends: "await-ci.Succeeded"
    inputs:
      pr: "{{steps.create-pr.outputs.pr_number}}"
    outputs: [approved, review_status, security_check, performance_check]

  # Cross-repo step: update core library based on plugin implementation
  - id: update-core
    type: agent
    agent: autonomous-developer
    repo: pulp/pulpcore
    depends: "review.Succeeded"
    inputs:
      context: "Update core to support changes in PR #{{steps.create-pr.outputs.pr_number}}"
      plugin_summary: "{{steps.implement.outputs.summary}}"
    outputs: [core_pr_url, core_changes]

  # Merge the plugin PR after review passes
  - id: merge-plugin-pr
    type: bridge
    action: merge-pr
    depends: "review.Succeeded"
    inputs:
      repo: pulp/pulp_python
      pr: "{{steps.create-pr.outputs.pr_number}}"

  # Deploy to staging: runs after both PRs are ready
  - id: deploy-staging
    type: agent
    agent: deploy-agent
    depends: "merge-plugin-pr.Succeeded && update-core.Succeeded"
    inputs:
      pr: "{{steps.create-pr.outputs.pr_number}}"
      core_pr_url: "{{steps.update-core.outputs.core_pr_url}}"
      context: "{{steps.implement.outputs.summary}}"
      environment: "staging"
    outputs: [deployment_url, version]

  # Smoke tests: runs after staging deployment
  - id: verify-staging
    type: agent
    agent: smoke-test
    depends: "deploy-staging.Succeeded"
    inputs:
      target_url: "{{steps.deploy-staging.outputs.deployment_url}}"
      version: "{{steps.deploy-staging.outputs.version}}"
    outputs: [test_results, status, coverage_percent]

  # Production deployment: requires manual approval
  - id: deploy-production
    type: agent
    agent: deploy-agent
    depends: "verify-staging.Succeeded"
    approval: required
    inputs:
      context: "Deploying verified version {{steps.deploy-staging.outputs.version}}"
      environment: "production"
    outputs: [production_url, deployment_id]

  # Post-deployment verification
  - id: verify-production
    type: agent
    agent: smoke-test
    depends: "deploy-production.Succeeded"
    inputs:
      target_url: "{{steps.deploy-production.outputs.production_url}}"
      deployment_id: "{{steps.deploy-production.outputs.deployment_id}}"
    outputs: [final_status]

  # Cleanup: runs regardless of success/failure of verification
  - id: cleanup
    type: agent
    agent: cleanup-agent
    depends: "verify-production.Succeeded || verify-production.Failed"
    inputs:
      branch_name: "{{steps.implement.outputs.branch_name}}"
      staging_url: "{{steps.deploy-staging.outputs.deployment_url}}"
