name: Full SDLC Pipeline
trigger:
  github:
    events: [issues]
    actions: [labeled]
    labels: [ready-for-dev]
    repos: [alcove-ai/alcove]
    delivery_mode: polling

workflow:
  - id: claim-issue
    type: bridge
    action: update-issue
    inputs:
      repo: alcove-ai/alcove
      issue: "{{trigger.issue_number}}"
      add_assignees: ["alcove-bot"]
      remove_labels: ["ready-for-dev"]

  - id: implement
    type: agent
    agent: Autonomous Developer
    depends: "claim-issue.Succeeded"
    max_retries: 3
    inputs:
      branch: "issue-{{trigger.issue_number}}-fix"
      issue_number: "{{trigger.issue_number}}"
      repo: "alcove-ai/alcove"
      issue_title: "{{trigger.issue_title}}"
      issue_body: "{{trigger.issue_body}}"
      issue_url: "{{trigger.issue_url}}"
    outputs: [summary]

  - id: create-pr
    type: bridge
    action: create-merge-request
    depends: "implement.Succeeded"
    inputs:
      repo: alcove-ai/alcove
      branch: "{{steps.implement.inputs.branch}}"
      title: "Fix #{{trigger.issue_number}}"
      base: main
      body: |
        Closes #{{trigger.issue_number}}

        ## {{trigger.issue_title}}

        ## Summary

        {{steps.implement.outputs.summary}}

  - id: await-ci
    type: bridge
    action: await-checks
    depends: "create-pr.Succeeded || ci-fix.Succeeded || rebase.Succeeded || conflict-resolve.Succeeded"
    max_iterations: 4
    inputs:
      repo: alcove-ai/alcove
      pr: "{{steps.create-pr.outputs.pr_number}}"

  - id: ci-fix
    type: agent
    agent: Autonomous Developer
    depends: "await-ci.Failed"
    max_iterations: 3
    inputs:
      branch: "{{steps.implement.inputs.branch}}"
      issue_number: "{{trigger.issue_number}}"
      repo: "alcove-ai/alcove"
      issue_title: "{{trigger.issue_title}}"
      issue_body: "{{trigger.issue_body}}"
      issue_url: "{{trigger.issue_url}}"
      ci_logs: "{{steps.await-ci.outputs.failure_logs}}"
    outputs: [summary]

  - id: code-review
    type: agent
    agent: PR Reviewer
    depends: "await-ci.Succeeded || revision.Succeeded"
    max_iterations: 3
    inputs:
      pr: "{{steps.create-pr.outputs.pr_number}}"
    outputs: [approved, comments]
    output_contract:
      required: [approved, comments]
      allowed_values:
        approved: ["true", "false"]
      routing_field: approved
      success_value: "true"

  - id: security-review
    type: agent
    agent: Security Reviewer
    depends: "await-ci.Succeeded || revision.Succeeded"
    max_iterations: 3
    inputs:
      pr: "{{steps.create-pr.outputs.pr_number}}"
    outputs: [approved, comments]
    output_contract:
      required: [approved, comments]
      allowed_values:
        approved: ["true", "false"]
      routing_field: approved
      success_value: "true"

  - id: revision
    type: agent
    agent: Autonomous Developer
    depends: "code-review.Failed || security-review.Failed"
    max_iterations: 3
    inputs:
      branch: "{{steps.implement.inputs.branch}}"
      issue_number: "{{trigger.issue_number}}"
      repo: "alcove-ai/alcove"
      issue_title: "{{trigger.issue_title}}"
      issue_body: "{{trigger.issue_body}}"
      issue_url: "{{trigger.issue_url}}"
      code_feedback: "{{steps.code-review.outputs.comments}}"
      security_feedback: "{{steps.security-review.outputs.comments}}"
    outputs: [summary]

  - id: rebase
    type: bridge
    action: rebase
    depends: "code-review.Succeeded && security-review.Succeeded"
    max_iterations: 3
    inputs:
      repo: alcove-ai/alcove
      pr: "{{steps.create-pr.outputs.pr_number}}"
      update_method: merge
    outputs: [status, new_head_sha]

  - id: conflict-resolve
    type: agent
    agent: Autonomous Developer
    depends: "rebase.Failed"
    max_iterations: 2
    inputs:
      branch: "{{steps.implement.inputs.branch}}"
      issue_number: "{{trigger.issue_number}}"
      repo: "alcove-ai/alcove"
      issue_title: "{{trigger.issue_title}}"
      issue_body: "{{trigger.issue_body}}"
      issue_url: "{{trigger.issue_url}}"
      merge_conflict_details: "{{steps.rebase.outputs.error}}"
      task_context: "Resolve merge conflicts detected during rebase step. The branch needs to be updated to work with the latest main branch."
    outputs: [summary]

  - id: merge
    type: bridge
    action: merge
    depends: "rebase.Succeeded || (conflict-resolve.Succeeded && await-ci.Succeeded)"
    inputs:
      repo: alcove-ai/alcove
      pr: "{{steps.create-pr.outputs.pr_number}}"
