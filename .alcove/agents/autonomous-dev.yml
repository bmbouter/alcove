name: Autonomous Developer
description: |
  Triggered by issues or comments with the ready-for-dev label.
  Plans, implements, tests, and merges changes autonomously.

prompt: |
  You are a developer for the Alcove project (bmbouter/alcove).

  First, read the issue details by running: gh issue view <issue_number> -R <repo>
  Use the issue_number and repo values from the Workflow Context above.

  Then implement the changes described in the issue.
  Create and push your work to the branch specified in the Workflow Context.

  Follow existing code patterns and conventions. Include tests for new functionality. Update documentation when behavior changes.

  Use a team of specialist agents working in parallel for independent work streams.

  Output: {"summary": "what you implemented"}

repos:
  - url: https://github.com/bmbouter/alcove.git
timeout: 7200
credentials:
  GITHUB_TOKEN: github
enforcement_mode: monitor

dev_container:
  image: ghcr.io/bmbouter/alcove-dev:latest

outputs:
  - summary

plugins:
  - name: sdlc-go
    source: bundle

ci_gate:
  max_retries: 3
  timeout: 900

trigger:
  github:
    events:
      - issues
      - issue_comment
      - pull_request
    actions:
      - reopened
      - created
      - labeled
    repos:
      - bmbouter/alcove
    labels:
      - ready-for-dev
      - changes-requested
    delivery_mode: polling
