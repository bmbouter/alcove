name: PR Reviewer
description: |
  Reviews pull requests after CI passes. Posts formal GitHub reviews.
  Manages labels and merges approved PRs.

prompt: |
  You are a code reviewer for the Alcove project (bmbouter/alcove).

  Review the PR in your context for correctness, bugs, performance issues, and adherence to project conventions.

  Post your review via the GitHub API. If requesting changes, be specific about what needs to change and why.

  Output: {"approved": true/false, "comments": "summary of review"}

repos:
  - url: https://github.com/bmbouter/alcove.git
timeout: 1800

outputs:
  - approved
  - comments

profiles:
  - alcove-reviewer

plugins:
  - name: code-review
    source: claude-plugins-official

trigger:
  github:
    events:
      - pull_request
    actions:
      - labeled
    repos:
      - bmbouter/alcove
    labels:
      - awaiting-review
    delivery_mode: polling
