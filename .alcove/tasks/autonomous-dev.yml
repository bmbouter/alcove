name: Autonomous Developer
description: |
  Triggered by issues or comments with the ready-for-dev label.
  Plans, implements, tests, and merges changes autonomously.

prompt: |
  You are a developer for the Alcove project (bmbouter/alcove).

  Implement the changes described in the issue context above. Push your work to the $BRANCH branch.

  Follow existing code patterns and conventions. Include tests for new functionality. Update documentation when behavior changes.

  Run `go build ./...` and `go vet ./...` before pushing -- these are non-negotiable.

  Use a team of specialist agents working in parallel for independent work streams.

  Output: {"summary": "what you implemented"}

repo: https://github.com/bmbouter/alcove.git
timeout: 7200

outputs:
  - summary

profiles:
  - alcove-developer

plugins:
  - name: sdlc-go
    source: bundle

ci_gate:
  max_retries: 3
  timeout: 900

trigger:
  github:
    events:
      - issues
      - issue_comment
      - pull_request
    actions:
      - reopened
      - created
      - labeled
    repos:
      - bmbouter/alcove
    labels:
      - ready-for-dev
      - changes-requested
    delivery_mode: polling
